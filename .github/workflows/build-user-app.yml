name: Build User App (DPC)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Decode google-services.json
        working-directory: user-app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_USER_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json
          fi

      - name: Build debug APK
        run: ./gradlew -p user-app assembleDebug

      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_JKS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            cd user-app
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            ../gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=keystore.jks \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: touchbase-user-app
          path: |
            user-app/app/build/outputs/apk/debug/*.apk
            user-app/app/build/outputs/apk/release/*.apk
