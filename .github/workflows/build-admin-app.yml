name: Build Admin App

on:
  push:
    branches: [main]
    paths:
      - 'admin-app/**'
      - '.github/workflows/build-admin-app.yml'
  pull_request:
    branches: [main]
    paths:
      - 'admin-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_ADMIN_JSON: ${{ secrets.GOOGLE_SERVICES_ADMIN_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_ADMIN_JSON" ]; then
            echo "$GOOGLE_SERVICES_ADMIN_JSON" | base64 -d > app/google-services.json
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_JKS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=keystore.jks \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: touchbase-admin-app
          path: |
            admin-app/app/build/outputs/apk/debug/*.apk
            admin-app/app/build/outputs/apk/release/*.apk
